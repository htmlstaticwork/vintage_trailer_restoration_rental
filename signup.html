<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Silver Studio</title>
    <meta name="description" content="Join Silver Studio. Create an account to start your vintage trailer journey.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.body?.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <style>
        .auth-section {
            background: var(--bg-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem;
        }

        [data-theme="dark"] .auth-section {
            background: #121212;
        }

        .auth-card {
            max-width: 500px;
            width: 100%;
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            background: #fff;
            padding: 3rem;
            position: relative;
        }

        [data-theme="dark"] .auth-card {
            background: var(--card-dark);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .social-btn {
            border: 1px solid #dee2e6;
            background: #fff;
            color: #37474F;
            transition: var(--transition);
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        [data-theme="dark"] .social-btn {
            background: #2a2a2a;
            border-color: #444;
            color: #fff;
        }

        .social-btn:hover {
            background-color: rgba(225, 27, 64, 0.05);
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-primary:hover {
            background-color: #C01433 !important;
            border-color: #C01433 !important;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(225, 27, 64, 0.3);
        }

        /* Dark Mode Specific Overrides */
        [data-theme="dark"] .form-control,
        [data-theme="dark"] .input-group-text {
            background-color: #1e1e1e !important;
            color: #fff !important;
            border: 1px solid #333 !important;
        }

        [data-theme="dark"] .form-control::placeholder {
            color: #888 !important;
        }

        [data-theme="dark"] .auth-separator {
            background-color: var(--card-dark) !important;
            color: #888 !important;
        }

        [data-theme="dark"] .text-muted {
            color: #aaa !important;
        }

        @media (max-width: 1024px) {
            .auth-section .auth-card {
                text-align: start !important;
            }

            .auth-section .form-label,
            .auth-section .form-check,
            .auth-section .form-check-label,
            .auth-section .input-group,
            .auth-section .form-control {
                text-align: start !important;
                justify-content: flex-start !important;
                align-items: flex-start !important;
            }

            .auth-section .form-label {
                display: block !important;
                width: 100% !important;
            }
        }

        @media (max-width: 768px) {
            .auth-section {
                padding-top: 5rem !important;
                flex-direction: column !important;
            }
        }

        .auth-toggles {
            position: absolute;
            top: 0;
            right: 0;
            margin: 1.5rem;
            z-index: 1000;
        }

        .was-validated .form-control:invalid~.invalid-feedback {
            display: block !important;
        }
    </style>
</head>

<body>

    <div class="auth-toggles d-flex gap-3">
        <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">
            <i class="bi bi-moon"></i>
        </button>
        <button id="rtl-toggle" class="rtl-toggle" title="Toggle RTL">
            <i class="bi bi-arrow-left-right"></i>
        </button>
    </div>

    <section class="auth-section">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html" class="text-decoration-none d-block mb-3">
                    <div class="playfair logo-text text-primary fs-3">
                        <i class="bi bi-house-heart me-2"></i>Silver Studio
                    </div>
                </a>
                <h2 class="playfair text-primary">Join the Journey</h2>
                <p class="text-muted small">Begin your timeless automotive adventure today</p>
            </div>

            <form id="signupForm" class="needs-validation" novalidate>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">Name</label>
                    <div class="input-group has-validation">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control bg-light border-0" placeholder="Name" required>
                        <div class="invalid-feedback">Please enter your name.</div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">Email Address</label>
                    <div class="input-group has-validation">
                        <span class="input-group-text bg-light border-0"><i
                                class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control bg-light border-0" placeholder="Email" required>
                        <div class="invalid-feedback">Please enter a valid email address.</div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">Password</label>
                    <div class="input-group has-validation">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control bg-light border-0" id="passwordInput"
                            placeholder="Password" minlength="8" required>
                        <span class="input-group-text bg-light border-0 cursor-pointer" id="togglePassword"><i
                                class="bi bi-eye text-muted"></i></span>
                        <div class="invalid-feedback">Password must be at least 8 characters long.</div>
                    </div>
                </div>

                <div class="form-check mb-4 small">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label text-muted" for="terms">
                        I agree to the <a href="#" class="text-primary text-decoration-none">Terms of Service</a> and <a
                            href="#" class="text-primary text-decoration-none">Privacy Policy</a>
                    </label>
                    <div class="invalid-feedback">You must agree before submitting.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 mb-4">Create Account</button>

                <div class="text-center position-relative mb-4">
                    <hr class="text-muted">
                    <span
                        class="position-absolute top-50 start-50 translate-middle bg-white auth-separator px-3 small text-muted"
                        style="z-index: 1;">OR</span>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-12 col-md-4">
                        <button type="button"
                            class="btn social-btn py-3 w-100 d-flex align-items-center justify-content-center">
                            <img src="https://www.google.com/favicon.ico" class="me-2" style="width: 20px;"> Google
                        </button>
                    </div>
                    <div class="col-12 col-md-4">
                        <button type="button"
                            class="btn social-btn py-3 w-100 d-flex align-items-center justify-content-center"
                            style="color: #1877F2;">
                            <i class="bi bi-facebook fs-5 me-2"></i> Facebook
                        </button>
                    </div>
                    <div class="col-12 col-md-4">
                        <button type="button"
                            class="btn social-btn py-3 w-100 d-flex align-items-center justify-content-center">
                            <i class="bi bi-apple fs-5 me-2"></i> Apple
                        </button>
                    </div>
                </div>

                <div class="text-center pt-2 small text-muted border-top">
                    Already have an account? <a href="login.html"
                        class="text-primary text-decoration-none fw-bold">Login</a>
                </div>
            </form>
        </div>
    </section>

    <!-- Custom JS -->
    <script src="js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Password visibility toggle
        if (document.getElementById('togglePassword')) {
            document.getElementById('togglePassword').addEventListener('click', function () {
                const pwd = document.getElementById('passwordInput');
                if (pwd.type === 'password') {
                    pwd.type = 'text';
                    this.innerHTML = '<i class="bi bi-eye-slash text-muted"></i>';
                } else {
                    pwd.type = 'password';
                    this.innerHTML = '<i class="bi bi-eye text-muted"></i>';
                }
            });
        }

        // Form validation
        document.addEventListener('DOMContentLoaded', function () {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        });
    </script>
</body>

</html>
